<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Patreon Refiner</title>
    <style>
        :root {
            --bg-base: #F2F2F7;
            --glass-surface: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.5);
            --accent: #007AFF;
            --text-primary: #000000;
            --text-secondary: #636366;
            --success: #34C759;
            --radius-main: 30px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-base: #000000;
                --glass-surface: rgba(28, 28, 30, 0.55);
                --glass-border: rgba(255, 255, 255, 0.12);
                --text-primary: #FFFFFF;
                --text-secondary: #8E8E93;
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background-color: var(--bg-base);
            font-family: -apple-system, "SF Pro Display", sans-serif;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            margin: 60px 0 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 液态玻璃面板 */
        .glass-box {
            width: 100%;
            max-width: 400px;
            background: var(--glass-surface);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: var(--radius-main);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), inset 0 0 0 1px var(--glass-border);
            padding: 10px;
            margin-bottom: 25px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 0.5px solid rgba(128, 128, 128, 0.15);
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .label {
            font-size: 17px;
            font-weight: 500;
        }

        input[type="number"],
        select {
            background: rgba(120, 120, 128, 0.12);
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 16px;
            color: var(--accent);
            font-weight: 600;
            text-align: right;
        }

        input[type="password"],
        select {
            background: rgba(120, 120, 128, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 16px;
            color: var(--accent);
            font-weight: 600;
            text-align: right;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* iOS Toggle */
        .switch {
            width: 51px;
            height: 31px;
            border-radius: 31px;
            background: rgba(120, 120, 128, 0.32);
            position: relative;
            transition: 0.3s;
        }

        .switch.on {
            background: var(--success);
        }

        .switch-dot {
            width: 27px;
            height: 27px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
            transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1.3);
        }

        .switch.on .switch-dot {
            transform: translateX(20px);
        }

        .btn-group {
            width: 100%;
            max-width: 400px;
            gap: 15px;
            display: flex;
            flex-direction: column;
        }

        .primary-btn {
            height: 60px;
            border-radius: 20px;
            background: var(--text-primary);
            color: var(--bg-base);
            border: none;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .primary-btn:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        .primary-btn:disabled {
            opacity: 0.5;
        }

        #dl-btn {
            display: none;
            height: 60px;
            border-radius: 20px;
            background: var(--success);
            color: white;
            text-align: center;
            line-height: 60px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(52, 199, 89, 0.3);
        }

        .status-info {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 10px;
            font-weight: 500;
            min-height: 1.2em;
        }

        #file-input {
            display: none;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Patreon Refiner</h1>
    </div>

    <div class="glass-box">
        <div class="list-item">
            <span class="label">授权密码</span>
            <input type="password" id="access_token" placeholder="Input token">
        </div>
        <div class="list-item">
            <span class="label">图片质量（%）</span>
            <input type="number" id="quality_show" value="70" min="10" max="100">
        </div>
        <div class="list-item">
            <span class="label">保留往期（天）</span>
            <input type="number" id="remainDays" value="0" min="0" max="30">
        </div>
        <div class="list-item">
            <span class="label">分页模式</span>
            <select id="paginationMode">
                <option value="auto_card">自动分页</option>
                <option value="single">全长单页</option>
            </select>
        </div>
        <div class="list-item">
            <span class="label">保留链接</span>
            <div class="switch" id="link-switch" onclick="toggleLink()">
                <div class="switch-dot"></div>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <input type="file" id="file-input" accept=".html" onchange="startProcess()">
        <button class="primary-btn" id="main-btn" onclick="document.getElementById('file-input').click()">
            上传文件（HTML）
        </button>
        <div id="dl-btn" onclick="doDownload()">下载文件</div>
        <div class="status-info" id="status-text">等待上传...</div>
    </div>

    <script>
        // 1. 初始化鉴权记忆
        document.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('refiner_token');
            if (savedToken) {
                document.getElementById('access_token').value = savedToken;
            }
        });
        let isLinkEnabled = false; // 默认关闭
        let downloadPath = null;
        let finalFileName = "";

        function toggleLink() {
            isLinkEnabled = !isLinkEnabled;
            document.getElementById('link-switch').classList.toggle('on', isLinkEnabled);
        }

        function updateStatus(msg) {
            document.getElementById('status-text').innerText = msg;
        }

        async function startProcess() {
            const fi = document.getElementById('file-input');
            // 注意：你代码里的输入框 ID 是 access_token
            const token = document.getElementById('access_token').value;
            if (!fi.files[0]) return;

            localStorage.setItem('refiner_token', token);

            const btn = document.getElementById('main-btn');
            const dl = document.getElementById('dl-btn');

            // UI 状态
            btn.disabled = true;
            btn.innerText = "正在同步...";
            dl.style.display = 'none';
            updateStatus("正在建立连接...");

            const fd = new FormData();
            fd.append('access_token', token);
            fd.append('htmlFile', fi.files[0]);
            // 10-100 映射到 0.1-1.0
            const q = (parseInt(document.getElementById('quality_show').value) / 100).toFixed(1);
            fd.append('quality', q);
            fd.append('remainDays', document.getElementById('remainDays').value);
            fd.append('paginationMode', document.getElementById('paginationMode').value);
            fd.append('enableLinks', isLinkEnabled ? "true" : "false");

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload', true);
            xhr.setRequestHeader("X-Access-Token", token);

            // 监听进度 (不需要复杂后端逻辑)
            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    updateStatus(`上传进度: ${percent}%`);
                    if (percent === 100) updateStatus("渲染中,请勿刷新页面");
                }
            };

            xhr.onload = function () {
                btn.disabled = false;
                btn.innerText = "选取下一个文件";
                // --- 修改此段逻辑 ---
                if (xhr.status === 200) {
                    const res = JSON.parse(xhr.responseText);
                    if (res.success) {
                        downloadPath = res.url;
                        finalFileName = res.name;
                        dl.style.display = 'block';
                        updateStatus("渲染完成");
                    } else {
                        updateStatus("出错: " + res.error);
                    }
                } else {
                    // 尝试解析 401 或其他错误状态返回的 JSON 信息
                    try {
                        const res = JSON.parse(xhr.responseText);
                        updateStatus(res.error || "请求失败: " + xhr.status);
                    } catch (e) {
                        updateStatus("服务器响应异常: " + xhr.status);
                    }
                }
                // ------------------
                fi.value = "";
            };

            xhr.onerror = () => {
                updateStatus("连接中断");
                btn.disabled = false;
            };

            xhr.send(fd);
        }

        function doDownload() {
            if (!downloadPath) return;
            const a = document.createElement('a');
            a.href = downloadPath;
            a.download = finalFileName;
            a.click();
        }
    </script>
</body>

</html>
